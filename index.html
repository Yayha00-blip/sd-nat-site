<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD-NAT — Équipes de Recherche, Sauvetage et Déblaiement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#101826;
  --ink-soft:#3a4558;
  --muted:#68738a;
  --line:#e2e6ee;
  --line-soft:#edf0f5;
  --paper:#f4f6f9;
  --card:#ffffff;
  --sidebar:#0d1420;
  --sidebar-soft:#151f30;
  --sidebar-line:#232f45;
  --sidebar-text:#aab4c8;
  --accent:#c81e2c;
  --accent-dark:#9c1521;
  --accent-soft:#fce8e9;
  --lourde:#b3261e;
  --lourde-soft:#fbeceb;
  --moyenne:#b5760f;
  --moyenne-soft:#fbf1e0;
  --legere:#1b7a5b;
  --legere-soft:#e7f4ef;
  --ok:#1b7a5b;
  --warn:#b5760f;
  --danger:#b3261e;
  --radius:10px;
  --shadow:0 1px 2px rgba(16,24,38,.04), 0 6px 20px -8px rgba(16,24,38,.12);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',monospace;}
h1,h2,h3,h4{font-family:'Oswald',sans-serif; font-weight:600; letter-spacing:.2px; margin:0;}
.app{display:flex; min-height:100vh;}

/* ---------- Sidebar ---------- */
.sidebar{
  width:250px; flex-shrink:0; background:var(--sidebar); color:var(--sidebar-text);
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh;
}
.brand{
  padding:22px 20px 18px; border-bottom:1px solid var(--sidebar-line);
}
.brand .mark{
  display:flex; align-items:center; gap:10px; margin-bottom:4px;
}
.brand .mark .dot{
  width:10px;height:10px;border-radius:2px;background:var(--accent);
  box-shadow:0 0 0 3px rgba(200,30,44,.18);
}
.brand h1{color:#fff; font-size:19px; letter-spacing:.5px;}
.brand p{margin:4px 0 0; font-size:11.5px; color:#7c869c; letter-spacing:.3px; text-transform:uppercase;}

nav.navlist{padding:14px 12px; flex:1; overflow-y:auto;}
nav.navlist .navgroup-label{
  font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; color:#5b6884;
  padding:14px 10px 6px;
}
nav.navlist button{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left;
  background:none; border:none; color:var(--sidebar-text); font-size:14px; font-family:inherit;
  padding:10px 10px; border-radius:8px; cursor:pointer; margin-bottom:2px;
}
nav.navlist button svg{width:16px;height:16px; flex-shrink:0; opacity:.8;}
nav.navlist button:hover{background:var(--sidebar-soft); color:#fff;}
nav.navlist button.active{background:var(--accent); color:#fff;}
nav.navlist button.active svg{opacity:1;}
nav.navlist button .count{
  margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#7c869c; background:#0006;
  padding:1px 6px; border-radius:20px;
}
nav.navlist button.active .count{color:#fff; background:rgba(255,255,255,.22);}

.sidebar-foot{padding:14px 20px; border-top:1px solid var(--sidebar-line); font-size:11px; color:#5b6884;}

/* ---------- Main ---------- */
main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:16px 28px; background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;
}
.topbar h2{font-size:22px;}
.topbar .sub{color:var(--muted); font-size:13px; margin-top:2px;}
.topbar-actions{display:flex; gap:10px;}
.content{padding:24px 28px 60px; flex:1;}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:7px; font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600;
  padding:9px 15px; border-radius:8px; border:1px solid var(--line); background:#fff; color:var(--ink-soft);
  cursor:pointer; transition:.12s; white-space:nowrap;
}
.btn:hover{border-color:#c7cedb; background:#fafbfd;}
.btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
.btn.primary:hover{background:var(--accent-dark); border-color:var(--accent-dark);}
.btn.ghost{border-color:transparent; background:transparent;}
.btn.ghost:hover{background:var(--line-soft);}
.btn.sm{padding:6px 10px; font-size:12.5px;}
.btn.danger{color:var(--danger); border-color:#f0d3d1;}
.btn.danger:hover{background:var(--lourde-soft);}
.btn svg{width:14px;height:14px;}

/* ---------- Cards / KPI ---------- */
.grid-kpi{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:22px;}
.kpi{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px; box-shadow:var(--shadow);}
.kpi .label{font-size:11.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); font-weight:600;}
.kpi .value{font-family:'Oswald',sans-serif; font-size:32px; margin-top:6px; color:var(--ink);}
.kpi .value small{font-size:14px; color:var(--muted); font-family:'Inter',sans-serif; font-weight:500;}
.kpi .foot{font-size:12px; color:var(--muted); margin-top:4px;}
.kpi.accent-lourde .value{color:var(--lourde);}
.kpi.accent-moyenne .value{color:var(--moyenne);}
.kpi.accent-legere .value{color:var(--legere);}

.panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:20px;}
.panel-head{display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line-soft);}
.panel-head h3{font-size:15px;}
.panel-head .hint{font-size:12px; color:var(--muted); font-family:'Inter';font-weight:400;}
.panel-body{padding:18px;}

.two-col{display:grid; grid-template-columns:1.3fr 1fr; gap:18px;}
@media(max-width:980px){.two-col{grid-template-columns:1fr;}}

/* bar rows */
.barrow{display:grid; grid-template-columns:150px 1fr 46px; align-items:center; gap:10px; margin-bottom:10px; font-size:12.5px;}
.barrow .name{color:var(--ink-soft); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.barrow .track{background:var(--line-soft); border-radius:6px; height:9px; overflow:hidden;}
.barrow .fill{height:100%; border-radius:6px;}
.barrow .num{text-align:right; font-family:'IBM Plex Mono'; color:var(--muted);}

.badge{display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:600;}
.badge.lourde{background:var(--lourde-soft); color:var(--lourde);}
.badge.moyenne{background:var(--moyenne-soft); color:var(--moyenne);}
.badge.legere{background:var(--legere-soft); color:var(--legere);}
.badge::before{content:''; width:6px; height:6px; border-radius:50%; background:currentColor;}

.badge.status-ok{background:var(--legere-soft); color:var(--legere);}
.badge.status-warn{background:var(--moyenne-soft); color:var(--moyenne);}
.badge.status-missing{background:#eceef2; color:var(--muted);}
.badge.status-expired{background:var(--lourde-soft); color:var(--lourde);}

/* ---------- Equipes ---------- */
.tabs{display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap;}
.tabs button{
  font-family:'Inter'; font-size:13px; font-weight:600; padding:8px 14px; border-radius:8px; border:1px solid var(--line);
  background:#fff; color:var(--ink-soft); cursor:pointer;
}
.tabs button.active{background:var(--ink); color:#fff; border-color:var(--ink);}

.team-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px;}
.team-card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;}
.team-card .tc-head{padding:14px 16px; border-bottom:1px solid var(--line-soft); display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.team-card .tc-head h4{font-size:14.5px; line-height:1.3;}
.team-card .tc-head .region{font-size:11.5px; color:var(--muted); margin-top:3px;}
.team-card .tc-stats{display:flex; gap:14px; padding:12px 16px; font-size:12px; color:var(--muted); border-bottom:1px solid var(--line-soft);}
.team-card .tc-stats b{color:var(--ink); font-family:'IBM Plex Mono'; font-size:13px; display:block;}
.team-card .tc-vehicles{padding:12px 16px; font-size:12px;}
.team-card .tc-vehicles .veh{display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px dashed var(--line-soft); color:var(--ink-soft);}
.team-card .tc-vehicles .veh:last-child{border-bottom:none;}
.team-card .tc-vehicles .veh .im{color:var(--muted); font-family:'IBM Plex Mono'; font-size:11px;}
.team-card .tc-foot{padding:10px 16px; background:var(--line-soft);}
.team-card .tc-foot a{font-size:12.5px; font-weight:600; color:var(--accent); cursor:pointer; text-decoration:none;}

/* ---------- Table ---------- */
.filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; align-items:center;}
.filters input[type=text], .filters select{
  font-family:'Inter'; font-size:13px; padding:9px 12px; border-radius:8px; border:1px solid var(--line); background:#fff; color:var(--ink);
}
.filters input[type=text]{min-width:220px;}
.filters .spacer{flex:1;}
.filters .resultcount{font-size:12.5px; color:var(--muted);}

table.data{width:100%; border-collapse:collapse; font-size:13px;}
table.data thead th{
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
  padding:10px 12px; border-bottom:2px solid var(--line); background:var(--line-soft); position:sticky; top:0;
  cursor:pointer; user-select:none; white-space:nowrap;
}
table.data thead th:hover{color:var(--ink);}
table.data tbody td{padding:10px 12px; border-bottom:1px solid var(--line-soft); vertical-align:middle;}
table.data tbody tr:hover{background:#fafbfd;}
table.data .name-cell{font-weight:600; color:var(--ink);}
table.data .sub-cell{font-size:11.5px; color:var(--muted);}
.table-scroll{overflow-x:auto; border-radius:var(--radius);}
.actions-cell{display:flex; gap:6px;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(13,20,32,.55); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:#fff; border-radius:14px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.35);
}
.modal-head{display:flex; justify-content:space-between; align-items:center; padding:18px 22px; border-bottom:1px solid var(--line);}
.modal-head h3{font-size:17px;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.form-grid .full{grid-column:1/-1;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:5px;}
.field input, .field select, .field textarea{
  width:100%; font-family:'Inter'; font-size:13.5px; padding:9px 11px; border-radius:8px; border:1px solid var(--line); background:#fbfcfd;
}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--accent); outline-offset:0; border-color:var(--accent);}
.field.section-label{grid-column:1/-1; margin-top:4px; padding-top:10px; border-top:1px dashed var(--line);}
.field.section-label span{font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--accent); font-weight:700;}

.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:6px;border-radius:6px;display:flex;}
.icon-btn:hover{background:var(--line-soft); color:var(--ink);}

.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff;
  padding:11px 20px; border-radius:9px; font-size:13.5px; opacity:0; transition:.25s; z-index:200; box-shadow:var(--shadow);
  display:flex; align-items:center; gap:8px;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.empty-state{text-align:center; padding:60px 20px; color:var(--muted);}
.empty-state svg{width:40px;height:40px; margin-bottom:12px; opacity:.5;}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:#ccd3e0; border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}

@media(max-width:860px){
  .sidebar{position:fixed; left:-260px; z-index:50; transition:.2s; box-shadow:0 0 0 2000px rgba(0,0,0,0);}
  .sidebar.open{left:0; box-shadow:0 0 0 2000px rgba(0,0,0,.4);}
  .content{padding:16px;}
  .topbar{padding:12px 16px;}
  .form-grid{grid-template-columns:1fr;}
}
.hamburger{display:none; background:none; border:1px solid var(--line); border-radius:8px; padding:8px; cursor:pointer;}
@media(max-width:860px){.hamburger{display:flex;}}
</style>
</head>

</div>

<div class="toast" id="toast"></div>

/* ============================================================
   STORAGE LAYER
   ============================================================ */
const STORAGE_KEY = 'sd_nat_overrides_v1';
let overrides = { edits:{}, added:[], deleted:[] };
let storageAvailable = true;
try{
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw) overrides = JSON.parse(raw);
}catch(e){ storageAvailable = false; }

function persist(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
  }catch(e){ storageAvailable = false; }
}

let nextId = Math.max(0, ...BASE_PEOPLE.map(p=>p.id), ...overrides.added.map(p=>p.id)) + 1;

function getPeople(){
  const deleted = new Set(overrides.deleted);
  const list = BASE_PEOPLE
    .filter(p=>!deleted.has(p.id))
    .map(p=> overrides.edits[p.id] ? {...p, ...overrides.edits[p.id]} : p);
  const added = overrides.added.filter(p=>!deleted.has(p.id));
  return list.concat(added);
}

function savePerson(data){
  if(data.id && (BASE_PEOPLE.some(p=>p.id===data.id) )){
    overrides.edits[data.id] = data;
  } else if(data.id && overrides.added.some(p=>p.id===data.id)){
    overrides.added = overrides.added.map(p=>p.id===data.id?data:p);
  } else {
    data.id = nextId++;
    overrides.added.push(data);
  }
  persist();
}

function deletePerson(id){
  overrides.deleted.push(id);
  persist();
}

function resetAllData(){
  overrides = { edits:{}, added:[], deleted:[] };
  persist();
}

   UTIL
   ============================================================ */
function esc(s){ return (s===undefined||s===null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function catClass(cat){ return cat==='Lourde'?'lourde':cat==='Moyenne'?'moyenne':'legere'; }
function gradeLabel(g){ return GRADE_LABELS[g] || g || '—'; }
function uniqueSorted(arr){ return [...new Set(arr)].filter(Boolean).sort((a,b)=>a.localeCompare(b)); }
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'), 2600);
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr); if(isNaN(d)) return null;
  return Math.floor((d - new Date())/86400000);
}
function passportStatus(p){
  if(!p.passeport_num && !p.passeport_validite) return {label:'À renseigner', cls:'status-missing'};
  if(!p.passeport_validite) return {label:'Validité manquante', cls:'status-missing'};
  const d = daysUntil(p.passeport_validite);
  if(d===null) return {label:'À renseigner', cls:'status-missing'};
  if(d<0) return {label:'Expiré', cls:'status-expired'};
  if(d<=90) return {label:'Expire bientôt', cls:'status-warn'};
  return {label:'Valide', cls:'status-ok'};
}

let currentView = 'dashboard';
let equipeTab = 'Toutes';
let personnelFilters = { q:'', region:'', categorie:'', grade:'' };
let sortState = {key:'nom', dir:1};

function renderNav(){
  const groups = {};
  NAV.forEach(n=>{ (groups[n.group]=groups[n.group]||[]).push(n); });
  let html='';
  Object.keys(groups).forEach(g=>{
    html += `<div class="navgroup-label">${g}</div>`;
    groups[g].forEach(n=>{
      html += `<button data-view="${n.id}" class="${currentView===n.id?'active':''}">${ICONS[n.icon]}<span>${n.label}</span></button>`;
    });
  });
  document.getElementById('navlist').innerHTML = html;
  document.querySelectorAll('#navlist button').forEach(b=>{
    b.addEventListener('click', ()=>{ currentView=b.dataset.view; render(); });
  });
}

/* ============================================================
   RENDER — DASHBOARD
   ============================================================ */
function renderDashboard(){
  const people = getPeople();
  const cats = ['Lourde','Moyenne','Legere'];
  const total = people.length;
  const byCat = {}; cats.forEach(c=>byCat[c]=people.filter(p=>p.categorie===c).length);
  const equipesSet = new Set(people.map(p=>p.equipe));
  const vehSet = new Set(people.map(p=>p.vehicule+'|'+p.immatriculation));
  const regions = uniqueSorted(people.map(p=>p.region));
  const missingDocs = people.filter(p=>passportStatus(p).cls!=='status-ok').length;

  let html = `<div class="grid-kpi">
    <div class="kpi"><div class="label">Effectif total</div><div class="value">${total}</div><div class="foot">${equipesSet.size} équipes actives</div></div>
    <div class="kpi accent-lourde"><div class="label">Équipes lourdes</div><div class="value">${byCat.Lourde} <small>agents</small></div><div class="foot">USAR national</div></div>
    <div class="kpi accent-moyenne"><div class="label">Équipes moyennes</div><div class="value">${byCat.Moyenne} <small>agents</small></div><div class="foot">Niveau régional (UMRI)</div></div>
    <div class="kpi accent-legere"><div class="label">Équipes légères</div><div class="value">${byCat.Legere} <small>agents</small></div><div class="foot">Premiers secours locaux</div></div>
    <div class="kpi"><div class="label">Véhicules recensés</div><div class="value">${vehSet.size}</div><div class="foot">${regions.length} régions couvertes</div></div>
    <div class="kpi"><div class="label">Documents à jour</div><div class="value" style="color:${missingDocs>0?'var(--moyenne)':'var(--legere)'}">${total-missingDocs}<small>/${total}</small></div><div class="foot">${missingDocs} dossiers à compléter</div></div>
  </div>`;

  html += `<div class="two-col">
    <div class="panel">
      <div class="panel-head"><h3>Répartition par région</h3><span class="hint">effectifs</span></div>
      <div class="panel-body" id="regionBars"></div>
    </div>
    <div class="panel">
      <div class="panel-head"><h3>Répartition par catégorie</h3></div>
      <div class="panel-body">
        ${cats.map(c=>{
          const n=byCat[c]; const pct= total? Math.round(n/total*100):0;
          const label = c==='Legere'?'Légère':c;
          return `<div class="barrow"><div class="name"><span class="badge ${catClass(c)}">${label}</span></div>
            <div class="track"><div class="fill" style="width:${pct}%; background:var(--${catClass(c)})"></div></div>
            <div class="num">${n}</div></div>`;
        }).join('')}
        <div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--line-soft); font-size:12px; color:var(--muted); line-height:1.6;">
          <b style="color:var(--ink)">02</b> équipes lourdes (USAR national) · <b style="color:var(--ink)">08</b> équipes moyennes régionales · <b style="color:var(--ink)">12</b> équipes légères locales.
        </div>
      </div>
    </div>
  </div>`;

  html += `<div class="panel">
    <div class="panel-head"><h3>Grades les plus représentés</h3></div>
    <div class="panel-body" id="gradeBars" style="display:grid; grid-template-columns:1fr 1fr; gap:0 24px;"></div>
  </div>`;

  document.getElementById('content').innerHTML = html;

  // region bars
  const regCounts = regions.map(r=>({r, n:people.filter(p=>p.region===r).length})).sort((a,b)=>b.n-a.n);
  const maxR = Math.max(...regCounts.map(x=>x.n),1);
  document.getElementById('regionBars').innerHTML = regCounts.map(x=>`
    <div class="barrow"><div class="name" title="${esc(x.r)}">${esc(x.r)}</div>
      <div class="track"><div class="fill" style="width:${x.n/maxR*100}%; background:var(--accent)"></div></div>
      <div class="num">${x.n}</div></div>`).join('');

  // grade bars
  const gradeCounts = {};
  people.forEach(p=>{ if(p.grade) gradeCounts[p.grade]=(gradeCounts[p.grade]||0)+1; });
  const gArr = Object.entries(gradeCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxG = Math.max(...gArr.map(x=>x[1]),1);
  document.getElementById('gradeBars').innerHTML = gArr.map(([g,n])=>`
    <div class="barrow"><div class="name">${esc(gradeLabel(g))} <span class="mono" style="color:var(--muted)">(${esc(g)})</span></div>
      <div class="track"><div class="fill" style="width:${n/maxG*100}%; background:var(--ink-soft)"></div></div>
      <div class="num">${n}</div></div>`).join('');
}

/* ============================================================
   RENDER — EQUIPES
   ============================================================ */
function renderEquipes(){
  const people = getPeople();
  const cats = ['Toutes','Lourde','Moyenne','Legere'];
  let html = `<div class="tabs">${cats.map(c=>`<button data-cat="${c}" class="${equipeTab===c?'active':''}">${c==='Legere'?'Légère':c==='Toutes'?'Toutes':c}</button>`).join('')}</div>`;

  const filtered = equipeTab==='Toutes'? people : people.filter(p=>p.categorie===equipeTab);
  const groups = {};
  filtered.forEach(p=>{
    const key = p.equipe;
    if(!groups[key]) groups[key] = {equipe:key, region:p.region, categorie:p.categorie, people:[], vehicules:{}};
    groups[key].people.push(p);
    const vk = p.vehicule||'—';
    groups[key].vehicules[vk] = groups[key].vehicules[vk] || {immat:p.immatriculation, count:0};
    groups[key].vehicules[vk].count++;
  });
  const teamArr = Object.values(groups).sort((a,b)=>a.equipe.localeCompare(b.equipe));

  html += `<div class="team-grid">`;
  teamArr.forEach(t=>{
    const cls = catClass(t.categorie);
    const label = t.categorie==='Legere'?'Légère':t.categorie;
    html += `<div class="team-card">
      <div class="tc-head">
        <div><h4>${esc(t.equipe)}</h4><div class="region">${esc(t.region)}</div></div>
        <span class="badge ${cls}">${label}</span>
      </div>
      <div class="tc-stats">
        <div><b>${t.people.length}</b>agents</div>
        <div><b>${Object.keys(t.vehicules).length}</b>véhicules</div>
      </div>
      <div class="tc-vehicles">
        ${Object.entries(t.vehicules).map(([v,info])=>`<div class="veh"><span>${esc(v)} ${info.count>1?`×${info.count}`:''}</span><span class="im">${esc(info.immat||'')}</span></div>`).join('') || '<div class="veh"><span>—</span></div>'}
      </div>
      <div class="tc-foot"><a data-openteam="${esc(t.equipe)}">Voir le personnel →</a></div>
    </div>`;
  });
  html += `</div>`;
  if(teamArr.length===0){ html += emptyState('Aucune équipe pour ce filtre.'); }

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('.tabs button').forEach(b=>b.addEventListener('click', ()=>{ equipeTab=b.dataset.cat; render(); }));
  document.querySelectorAll('[data-openteam]').forEach(a=>a.addEventListener('click', ()=>{
    currentView='personnel'; personnelFilters={q:'', region:'', categorie:'', grade:''};
    personnelFilters.equipeExact = a.dataset.openteam;
    render();
  }));
}

function emptyState(msg){
  return `<div class="empty-state">${ICONS.alert.replace('currentColor','#c7cedb')}<div>${esc(msg)}</div></div>`;
}

/* ============================================================
   RENDER — PERSONNEL
   ============================================================ */
function renderPersonnel(){
  const all = getPeople();
  const regions = uniqueSorted(all.map(p=>p.region));
  const grades = uniqueSorted(all.map(p=>p.grade));

  let html = `<div class="filters">
    <input type="text" id="fq" placeholder="Rechercher un nom, une fonction…" value="${esc(personnelFilters.q)}">
    <select id="fregion"><option value="">Toutes régions</option>${regions.map(r=>`<option value="${esc(r)}" ${personnelFilters.region===r?'selected':''}>${esc(r)}</option>`).join('')}</select>
    <select id="fcat"><option value="">Toutes catégories</option>
      <option value="Lourde" ${personnelFilters.categorie==='Lourde'?'selected':''}>Lourde</option>
      <option value="Moyenne" ${personnelFilters.categorie==='Moyenne'?'selected':''}>Moyenne</option>
      <option value="Legere" ${personnelFilters.categorie==='Legere'?'selected':''}>Légère</option>
    </select>
    <select id="fgrade"><option value="">Tous grades</option>${grades.map(g=>`<option value="${esc(g)}" ${personnelFilters.grade===g?'selected':''}>${esc(g)}</option>`).join('')}</select>
    <div class="spacer"></div>
    <div class="resultcount" id="resultCount"></div>
  </div>
  <div class="table-scroll"><table class="data">
    <thead><tr>
      <th data-sort="nom">Nom</th><th data-sort="grade">Grade</th><th data-sort="fonction">Fonction</th>
      <th data-sort="region">Région / Unité</th><th data-sort="categorie">Équipe</th><th data-sort="telephone">Téléphone</th>
      <th data-sort="passeport_validite">Passeport</th><th></th>
    </tr></thead>
    <tbody id="personnelBody"></tbody>
  </table></div>`;
  document.getElementById('content').innerHTML = html;

  document.getElementById('fq').addEventListener('input', e=>{ personnelFilters.q=e.target.value; delete personnelFilters.equipeExact; renderPersonnelBody(); });
  document.getElementById('fregion').addEventListener('change', e=>{ personnelFilters.region=e.target.value; delete personnelFilters.equipeExact; renderPersonnelBody(); });
  document.getElementById('fcat').addEventListener('change', e=>{ personnelFilters.categorie=e.target.value; delete personnelFilters.equipeExact; renderPersonnelBody(); });
  document.getElementById('fgrade').addEventListener('change', e=>{ personnelFilters.grade=e.target.value; delete personnelFilters.equipeExact; renderPersonnelBody(); });
  document.querySelectorAll('th[data-sort]').forEach(th=>th.addEventListener('click', ()=>{
    const k=th.dataset.sort;
    if(sortState.key===k) sortState.dir*=-1; else { sortState.key=k; sortState.dir=1; }
    renderPersonnelBody();
  }));
  renderPersonnelBody();
}

function applyPersonnelFilters(list){
  let out = list;
  if(personnelFilters.equipeExact) out = out.filter(p=>p.equipe===personnelFilters.equipeExact);
  if(personnelFilters.q){
    const q = personnelFilters.q.toLowerCase();
    out = out.filter(p=> (p.nom+' '+p.fonction+' '+p.grade).toLowerCase().includes(q));
  }
  if(personnelFilters.region) out = out.filter(p=>p.region===personnelFilters.region);
  if(personnelFilters.categorie) out = out.filter(p=>p.categorie===personnelFilters.categorie);
  if(personnelFilters.grade) out = out.filter(p=>p.grade===personnelFilters.grade);
  return out;
}

function renderPersonnelBody(){
  const all = getPeople();
  let list = applyPersonnelFilters(all);
  list = list.slice().sort((a,b)=>{
    const k=sortState.key;
    const av=(a[k]||'').toString(), bv=(b[k]||'').toString();
    return av.localeCompare(bv)*sortState.dir;
  });
  document.getElementById('resultCount').textContent = `${list.length} / ${all.length} agents`;
  const cls = catClass;
  document.getElementById('personnelBody').innerHTML = list.map(p=>{
    const st = passportStatus(p);
    return `<tr data-id="${p.id}">
      <td class="name-cell">${esc(p.nom)}${p.formation?`<div class="sub-cell">${esc(p.formation)}</div>`:''}</td>
      <td><span class="mono">${esc(p.grade||'—')}</span></td>
      <td>${esc(p.fonction||'—')}</td>
      <td>${esc(p.region)}<div class="sub-cell">${esc(p.equipe)}</div></td>
      <td><span class="badge ${cls(p.categorie)}">${p.categorie==='Legere'?'Légère':p.categorie}</span></td>
      <td class="mono">${esc(p.telephone||'—')}</td>
      <td><span class="badge ${st.cls}">${st.label}</span></td>
      <td class="actions-cell"><button class="btn sm" data-edit="${p.id}">Modifier</button></td>
    </tr>`;
  }).join('') || `<tr><td colspan="8">${emptyState('Aucun résultat pour ces filtres.')}</td></tr>`;

  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openPersonModal(parseInt(b.dataset.edit))));
}

/* ============================================================
   RENDER — VEHICULES
   ============================================================ */
function renderVehicules(){
  const people = getPeople();
  const groups = {};
  people.forEach(p=>{
    const key = (p.vehicule||'—')+'|'+(p.immatriculation||'')+'|'+p.equipe;
    if(!groups[key]) groups[key] = {vehicule:p.vehicule||'—', immat:p.immatriculation, equipe:p.equipe, region:p.region, categorie:p.categorie, count:0};
    groups[key].count++;
  });
  const arr = Object.values(groups).sort((a,b)=> a.region.localeCompare(b.region) || a.equipe.localeCompare(b.equipe));
  let html = `<div class="table-scroll"><table class="data">
    <thead><tr><th>Type d'engin</th><th>Immatriculation</th><th>Équipe</th><th>Région</th><th>Catégorie</th><th>Personnel affecté</th></tr></thead>
    <tbody>${arr.map(v=>`<tr>
      <td class="name-cell">${esc(v.vehicule)}</td>
      <td class="mono">${esc(v.immat||'—')}</td>
      <td>${esc(v.equipe)}</td>
      <td>${esc(v.region)}</td>
      <td><span class="badge ${catClass(v.categorie)}">${v.categorie==='Legere'?'Légère':v.categorie}</span></td>
      <td class="mono">${v.count}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
  document.getElementById('content').innerHTML = html;
}

/* ============================================================
   RENDER — REGION SYNTHESIS
   ============================================================ */
function renderRegionSynthese(){
  const people = getPeople();
  const regions = uniqueSorted(people.map(p=>p.region));
  const rows = regions.map(r=>{
    const sub = people.filter(p=>p.region===r);
    const veh = new Set(sub.map(p=>p.vehicule+'|'+p.immatriculation)).size;
    return {
      region:r, total:sub.length,
      lourde: sub.filter(p=>p.categorie==='Lourde').length,
      moyenne: sub.filter(p=>p.categorie==='Moyenne').length,
      legere: sub.filter(p=>p.categorie==='Legere').length,
      vehicules: veh,
      equipes: new Set(sub.map(p=>p.equipe)).size,
    };
  }).sort((a,b)=>b.total-a.total);

  let html = `<div class="table-scroll"><table class="data">
    <thead><tr><th>Région / Unité</th><th>Équipes</th><th>Lourde</th><th>Moyenne</th><th>Légère</th><th>Total effectif</th><th>Véhicules</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td class="name-cell">${esc(r.region)}</td>
      <td class="mono">${r.equipes}</td>
      <td class="mono" style="color:var(--lourde)">${r.lourde||'—'}</td>
      <td class="mono" style="color:var(--moyenne)">${r.moyenne||'—'}</td>
      <td class="mono" style="color:var(--legere)">${r.legere||'—'}</td>
      <td class="mono"><b>${r.total}</b></td>
      <td class="mono">${r.vehicules}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
  document.getElementById('content').innerHTML = html;
}

/* ============================================================
   RENDER — GRADE SYNTHESIS
   ============================================================ */
function renderGradeSynthese(){
  const people = getPeople();
  const grades = uniqueSorted(people.map(p=>p.grade));
  const rows = grades.map(g=>{
    const sub = people.filter(p=>p.grade===g);
    return {
      grade:g, label: gradeLabel(g), total:sub.length,
      lourde: sub.filter(p=>p.categorie==='Lourde').length,
      moyenne: sub.filter(p=>p.categorie==='Moyenne').length,
      legere: sub.filter(p=>p.categorie==='Legere').length,
    };
  }).sort((a,b)=>b.total-a.total);
  let html = `<div class="table-scroll"><table class="data">
    <thead><tr><th>Grade</th><th>Libellé</th><th>Lourde</th><th>Moyenne</th><th>Légère</th><th>Total</th></tr></thead>
    <tbody>${rows.map(r=>`<tr>
      <td class="name-cell mono">${esc(r.grade)}</td>
      <td>${esc(r.label)}</td>
      <td class="mono" style="color:var(--lourde)">${r.lourde||'—'}</td>
      <td class="mono" style="color:var(--moyenne)">${r.moyenne||'—'}</td>
      <td class="mono" style="color:var(--legere)">${r.legere||'—'}</td>
      <td class="mono"><b>${r.total}</b></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
  document.getElementById('content').innerHTML = html;
}

/* ============================================================
   RENDER — ALERTES
   ============================================================ */
function renderAlertes(){
  const people = getPeople();
  const withStatus = people.map(p=>({p, st:passportStatus(p)}));
  const missing = withStatus.filter(x=>x.st.cls==='status-missing');
  const expiring = withStatus.filter(x=>x.st.cls==='status-warn');
  const expired = withStatus.filter(x=>x.st.cls==='status-expired');

  let html = `<div class="grid-kpi">
    <div class="kpi"><div class="label">Passeports expirés</div><div class="value" style="color:var(--danger)">${expired.length}</div></div>
    <div class="kpi"><div class="label">Expirent sous 90 jours</div><div class="value" style="color:var(--warn)">${expiring.length}</div></div>
    <div class="kpi"><div class="label">Information manquante</div><div class="value" style="color:var(--muted)">${missing.length}</div></div>
  </div>`;

  function section(title, arr){
    if(!arr.length) return '';
    return `<div class="panel"><div class="panel-head"><h3>${esc(title)}</h3><span class="hint">${arr.length} agent(s)</span></div>
      <div class="table-scroll"><table class="data">
      <thead><tr><th>Nom</th><th>Grade</th><th>Région</th><th>N° Passeport</th><th>Validité</th><th></th></tr></thead>
      <tbody>${arr.map(x=>`<tr>
        <td class="name-cell">${esc(x.p.nom)}</td><td class="mono">${esc(x.p.grade||'—')}</td>
        <td>${esc(x.p.region)}</td><td class="mono">${esc(x.p.passeport_num||'—')}</td>
        <td class="mono">${esc(x.p.passeport_validite||'—')}</td>
        <td><button class="btn sm" data-edit="${x.p.id}">Compléter</button></td>
      </tr>`).join('')}</tbody></table></div></div>`;
  }
  html += section('Passeports expirés', expired);
  html += section('Passeports expirant sous 90 jours', expiring);
  html += section('Informations manquantes', missing);
  if(!expired.length && !expiring.length && !missing.length) html += emptyState('Tous les dossiers sont à jour.');

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openPersonModal(parseInt(b.dataset.edit))));
}

    </div>
    <div class="field"><label>Équipe</label><input id="f_equipe" value="${esc(p.equipe)}" placeholder="Equipe Moyenne UMRI ..."></div>
    <div class="field"><label>Région / Unité</label><input id="f_region" value="${esc(p.region)}"></div>
    <div class="field"><label>Véhicule affecté</label><input id="f_vehicule" value="${esc(p.vehicule)}"></div>
    <div class="field"><label>Immatriculation</label><input id="f_immatriculation" value="${esc(p.immatriculation)}"></div>

    <div class="field section-label"><span>Documents & identité</span></div>
    <div class="field"><label>CIN</label><input id="f_cin" value="${esc(p.cin)}"></div>
    <div class="field"><label>Date de naissance</label><input type="date" id="f_date_naissance" value="${esc(p.date_naissance)}"></div>
    <div class="field"><label>N° Passeport</label><input id="f_passeport_num" value="${esc(p.passeport_num)}"></div>
    <div class="field"><label>Validité du passeport</label><input type="date" id="f_passeport_validite" value="${esc(p.passeport_validite)}"></div>
    <div class="field full"><label>Notes</label><textarea id="f_notes" rows="2">${esc(p.notes)}</textarea></div>
  </div>`;
}

function openPersonModal(id){
  const all = getPeople();
  const p = id ? all.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = p ? 'Modifier — '+p.nom : 'Ajouter un agent';
  document.getElementById('modalBody').innerHTML = personFieldsForm(p);
  document.getElementById('modalDelete').style.display = p ? 'inline-flex' : 'none';
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  overlay.dataset.editId = p ? p.id : '';
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

function collectForm(){
  const g = id=>document.getElementById(id).value.trim();
  return {
    nom:g('f_nom'), grade:g('f_grade'), fonction:g('f_fonction'), telephone:g('f_telephone'),
    categorie:g('f_categorie'), equipe:g('f_equipe'), region:g('f_region'), unite:g('f_region'),
    vehicule:g('f_vehicule'), immatriculation:g('f_immatriculation'), cin:g('f_cin'),
    date_naissance:g('f_date_naissance'), passeport_num:g('f_passeport_num'), passeport_validite:g('f_passeport_validite'),
    notes:g('f_notes'), formation:''
  };
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target.id==='modalOverlay') closeModal(); });
document.getElementById('modalSave').addEventListener('click', ()=>{
  const data = collectForm();
  if(!data.nom){ showToast('Le nom est obligatoire.'); return; }
  const overlay = document.getElementById('modalOverlay');
  const editId = overlay.dataset.editId;
  if(editId) data.id = parseInt(editId);
  savePerson(data);
  closeModal();
  showToast('Fiche enregistrée.');
  render();
});
document.getElementById('modalDelete').addEventListener('click', ()=>{
  const overlay = document.getElementById('modalOverlay');
  const editId = overlay.dataset.editId;
  if(editId && confirm('Supprimer définitivement cette fiche ?')){
    deletePerson(parseInt(editId));
    closeModal();
    showToast('Fiche supprimée.');
    render();
  }
});
document.getElementById('btnAddPerson').addEventListener('click', ()=>openPersonModal(null));

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
document.getElementById('btnExport').addEventListener('click', ()=>{
  const data = getPeople();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sd_nat_personnel_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Export généré.');
});
document.getElementById('btnImport').addEventListener('click', ()=>document.getElementById('fileImport').click());
document.getElementById('fileImport').addEventListener('change', e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = evt=>{
    try{
      const arr = JSON.parse(evt.target.result);
      if(!Array.isArray(arr)) throw new Error('format');
      overrides = { edits:{}, added:[], deleted: BASE_PEOPLE.map(p=>p.id) };
      arr.forEach(p=>{ if(!p.id) p.id = nextId++; overrides.added.push(p); });
      persist();
      showToast('Import réussi — '+arr.length+' fiches chargées.');
      render();
    }catch(err){ showToast('Fichier JSON invalide.'); }
  };
  reader.readAsText(file);
  e.target.value='';
});

/* ============================================================
   ROUTER
   ============================================================ */
const TITLES = {
  dashboard:['Tableau de bord','Vue d’ensemble des équipes nationales'],
  equipes:['Équipes','Composition et articulation par équipe'],
  personnel:['Personnel','Fiches individuelles — recherche, filtres, édition'],
  vehicules:['Véhicules & matériel','Moyens matériels par équipe et région'],
  region:['Synthèse par région','Effectifs et moyens agrégés par région / unité'],
  grade:['Synthèse par grade','Répartition des effectifs par grade et catégorie'],
  alertes:['Alertes documents','Passeports et informations manquantes ou à renouveler'],
};

function render(){
  renderNav();
  const [title,sub] = TITLES[currentView];
  document.getElementById('pageTitle').textContent = title;
  document.getElementById('pageSub').textContent = sub;
  document.getElementById('footCount').textContent = getPeople().length;
  if(currentView==='dashboard') renderDashboard();
  else if(currentView==='equipes') renderEquipes();
  else if(currentView==='personnel') renderPersonnel();
  else if(currentView==='vehicules') renderVehicules();
  else if(currentView==='region') renderRegionSynthese();
  else if(currentView==='grade') renderGradeSynthese();
  else if(currentView==='alertes') renderAlertes();
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('hamburger').addEventListener('click', ()=>document.getElementById('sidebar').classList.toggle('open'));

if(!storageAvailable){
  setTimeout(()=>showToast('Stockage local indisponible — pensez à exporter vos modifications.'), 800);
}

render();
</script>
