<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD-NAT — Équipes de Recherche, Sauvetage et Déblaiement</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f8f5f0;
  --ink:#22190f;
  --ink-soft:#4a3d2e;
  --muted:#7c7060;
  --line:#e7ddcc;
  --line-soft:#f1ebe0;
  --paper:#f8f5f0;
  --card:#ffffff;
  --sidebar:#fffdfa;
  --sidebar-soft:#fdeee4;
  --sidebar-line:#eee2d0;
  --sidebar-text:#5a4c3a;
  --accent:#de5412;
  --accent2:#175091;
  --accent-dark:#b8420d;
  --accent-soft:#fdeee4;
  --gold:#c9a227;
  --gold-soft:#f8f0da;
  --navy:#175091;
  --navy-soft:#e7eef8;
  --lourde:#b3261e;
  --lourde-soft:#faeae8;
  --moyenne:#c9a227;
  --moyenne-soft:#f8f0da;
  --legere:#1b7a5b;
  --legere-soft:#e7f4ef;
  --husar:#175091;
  --husar-soft:#e7eef8;
  --nautique:#0e7490;
  --nautique-soft:#e1f3f6;
  --imp:#7c3aed;
  --imp-soft:#efe8fb;
  --fdf:#c2410c;
  --fdf-soft:#fce8dc;
  --autre:#7c7060;
  --autre-soft:#f1ebe0;
  --ok:#1b7a5b;
  --warn:#c9a227;
  --danger:#b3261e;
  --radius:14px;
  --shadow:0 1px 2px rgba(34,25,15,.05), 0 6px 18px -8px rgba(34,25,15,.14);
  --shadow-lg:0 16px 36px -12px rgba(34,25,15,.24);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',monospace;}
h1,h2,h3,h4{font-family:'Manrope',sans-serif; font-weight:700; letter-spacing:-.1px; margin:0; color:var(--ink);}
.app{display:flex; min-height:100vh;}

/* ---------- Sidebar ---------- */
.sidebar{
  width:272px; flex-shrink:0; background:var(--sidebar); color:var(--sidebar-text);
  display:flex; flex-direction:column; position:sticky; top:0; height:100vh; border-right:1px solid var(--sidebar-line);
}
.brand{
  padding:22px 22px 18px; border-bottom:1px solid var(--sidebar-line);
  display:flex; align-items:center; gap:13px; background:linear-gradient(180deg,#fffaf3, #fffdfa);
}
.brand .logo-img{width:52px; height:auto; flex-shrink:0; filter:drop-shadow(0 3px 6px rgba(222,84,18,.25));}
.brand h1{color:var(--ink); font-size:17px; letter-spacing:-.2px; line-height:1.2;}
.brand p{margin:3px 0 0; font-size:11px; color:var(--muted); line-height:1.35;}

nav.navlist{padding:16px 14px; flex:1; overflow-y:auto;}
nav.navlist .navgroup-label{
  font-size:10.5px; text-transform:uppercase; letter-spacing:.8px; color:#a3937a;
  padding:16px 10px 8px; font-weight:700;
}
nav.navlist button{
  display:flex; align-items:center; gap:12px; width:100%; text-align:left;
  background:none; border:none; color:var(--sidebar-text); font-size:14.5px; font-weight:600; font-family:inherit;
  padding:11px 12px; border-radius:10px; cursor:pointer; margin-bottom:3px;
}
nav.navlist button svg{width:18px;height:18px; flex-shrink:0; opacity:.65; stroke-width:2;}
nav.navlist button:hover{background:var(--sidebar-soft); color:var(--accent-dark);}
nav.navlist button.active{background:var(--accent); color:#fff;}
nav.navlist button.active svg{opacity:1;}
nav.navlist button .count{
  margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); background:var(--line-soft);
  padding:2px 7px; border-radius:20px; font-weight:600;
}
nav.navlist button.active .count{color:#fff; background:rgba(255,255,255,.25);}

.sidebar-foot{padding:16px 22px; border-top:1px solid var(--sidebar-line); font-size:11.5px; color:var(--muted);}

/* ---------- Main ---------- */
main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:20px 32px; background:var(--card); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:20;
}
.topbar h2{font-size:22px; font-weight:800;}
.topbar .sub{color:var(--muted); font-size:13.5px; margin-top:3px;}
.topbar-actions{display:flex; gap:10px;}
.content{padding:28px 32px 64px; flex:1;}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex; align-items:center; gap:7px; font-family:inherit; font-size:14px; font-weight:600;
  padding:10px 16px; border-radius:10px; border:1.5px solid var(--line); background:#fff; color:var(--ink-soft);
  cursor:pointer; transition:.12s; white-space:nowrap;
}
.btn:hover{border-color:var(--accent); color:var(--accent-dark); background:var(--accent-soft);}
.btn.primary{background:var(--accent); border-color:var(--accent); color:#fff;}
.btn.primary:hover{background:var(--accent-dark); border-color:var(--accent-dark); color:#fff;}
.btn.ghost{border-color:transparent; background:transparent;}
.btn.ghost:hover{background:var(--line-soft);}
.btn.sm{padding:7px 12px; font-size:13px;}
.btn.danger{color:var(--danger); border-color:#f1d4d0;}
.btn.danger:hover{background:var(--lourde-soft); border-color:var(--danger);}
.btn svg{width:14px;height:14px;}

/* ---------- Cards / KPI ---------- */
.grid-kpi{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px;}
.kpi{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px; box-shadow:var(--shadow); transition:.15s;}
.kpi:hover{box-shadow:var(--shadow-lg); transform:translateY(-2px);}
.kpi .label{font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:700;}
.kpi .value{font-family:'Manrope',sans-serif; font-size:30px; margin-top:8px; color:var(--ink); font-weight:800; line-height:1;}
.kpi .value small{font-size:14px; color:var(--muted); font-weight:600;}
.kpi .foot{font-size:12.5px; color:var(--muted); margin-top:7px;}
.kpi.accent-lourde{box-shadow:var(--shadow), inset 3px 0 0 var(--lourde);}
.kpi.accent-lourde .value{color:var(--lourde);}
.kpi.accent-moyenne{box-shadow:var(--shadow), inset 3px 0 0 var(--moyenne);}
.kpi.accent-moyenne .value{color:var(--moyenne);}
.kpi.accent-legere{box-shadow:var(--shadow), inset 3px 0 0 var(--legere);}
.kpi.accent-legere .value{color:var(--legere);}

.panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:22px; overflow:hidden;}
.panel-head{display:flex; align-items:center; justify-content:space-between; padding:17px 20px; border-bottom:1px solid var(--line);}
.panel-head h3{font-size:16px; font-weight:800;}
.panel-head .hint{font-size:12.5px; color:var(--muted); font-weight:500;}
.panel-body{padding:20px;}

.two-col{display:grid; grid-template-columns:1.3fr 1fr; gap:18px;}
@media(max-width:980px){.two-col{grid-template-columns:1fr;}}

/* bar rows */
.barrow{display:grid; grid-template-columns:150px 1fr 46px; align-items:center; gap:10px; margin-bottom:11px; font-size:13px;}
.barrow .name{color:var(--ink-soft); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.barrow .track{background:var(--line-soft); border-radius:20px; height:10px; overflow:hidden;}
.barrow .fill{height:100%; border-radius:20px; background:var(--accent);}
.barrow .num{text-align:right; font-family:'IBM Plex Mono'; color:var(--muted); font-weight:600;}

.badge{display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700;}
.badge.lourde{background:var(--lourde-soft); color:var(--lourde);}
.badge.moyenne{background:var(--moyenne-soft); color:var(--moyenne);}
.badge.legere{background:var(--legere-soft); color:var(--legere);}
.badge.husar{background:var(--husar-soft); color:var(--husar);}
.badge.nautique{background:var(--nautique-soft); color:var(--nautique);}
.badge.imp{background:var(--imp-soft); color:var(--imp);}
.badge.fdf{background:var(--fdf-soft); color:var(--fdf);}
.badge.autre{background:var(--autre-soft); color:var(--autre);}
.badge::before{content:''; width:6px; height:6px; border-radius:50%; background:currentColor;}

.badge.status-ok{background:var(--legere-soft); color:var(--legere);}
.badge.status-warn{background:var(--moyenne-soft); color:var(--moyenne);}
.badge.status-missing{background:var(--line-soft); color:var(--muted);}
.badge.status-expired{background:var(--lourde-soft); color:var(--lourde);}

/* ---------- Equipes ---------- */
.tabs{display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap;}
.tabs button{
  font-family:inherit; font-size:13.5px; font-weight:700; padding:9px 16px; border-radius:10px; border:1.5px solid var(--line);
  background:#fff; color:var(--ink-soft); cursor:pointer;
}
.tabs button.active{background:var(--ink); color:#fff; border-color:var(--ink);}

.team-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:18px;}
.team-card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;}
.team-card .tc-head{padding:16px 18px; border-bottom:1px solid var(--line-soft); display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
.team-card .tc-head h4{font-size:15px; line-height:1.35; font-weight:700;}
.team-card .tc-head .region{font-size:12px; color:var(--muted); margin-top:4px;}
.team-card .tc-stats{display:flex; gap:16px; padding:13px 18px; font-size:12.5px; color:var(--muted); border-bottom:1px solid var(--line-soft);}
.team-card .tc-stats b{color:var(--ink); font-family:'IBM Plex Mono'; font-size:14px; display:block;}
.team-card .tc-vehicles{padding:13px 18px; font-size:12.5px;}
.team-card .tc-vehicles .veh{display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed var(--line-soft); color:var(--ink-soft);}
.team-card .tc-vehicles .veh:last-child{border-bottom:none;}
.team-card .tc-vehicles .veh .im{color:var(--muted); font-family:'IBM Plex Mono'; font-size:11.5px;}
.team-card .tc-foot{padding:11px 18px; background:var(--accent-soft);}
.team-card .tc-foot a{font-size:13px; font-weight:700; color:var(--accent-dark); cursor:pointer; text-decoration:none;}

/* ---------- Table ---------- */
.filters{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; align-items:center;}
.filters input[type=text], .filters select{
  font-family:inherit; font-size:13.5px; padding:10px 13px; border-radius:10px; border:1.5px solid var(--line); background:#fff; color:var(--ink);
}
.filters input[type=text]{min-width:230px;}
.filters .spacer{flex:1;}
.filters .resultcount{font-size:13px; color:var(--muted); font-weight:600;}

table.data{width:100%; border-collapse:collapse; font-size:13.5px;}
table.data thead th{
  text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-soft); font-weight:800;
  padding:12px 14px; border-bottom:2px solid var(--line); background:var(--line-soft); position:sticky; top:0;
  cursor:pointer; user-select:none; white-space:nowrap;
}
table.data thead th:hover{color:var(--accent-dark);}
table.data tbody td{padding:11px 14px; border-bottom:1px solid var(--line-soft); vertical-align:middle;}
table.data tbody tr:hover{background:var(--accent-soft);}
table.data .name-cell{font-weight:700; color:var(--ink);}
table.data .sub-cell{font-size:12px; color:var(--muted); margin-top:2px;}
.table-scroll{overflow-x:auto; border-radius:var(--radius); border:1px solid var(--line);}
.table-scroll table.data thead th:first-child{border-top-left-radius:var(--radius);}
.table-scroll table.data thead th:last-child{border-top-right-radius:var(--radius);}
.actions-cell{display:flex; gap:6px;}

/* ---------- Modal ---------- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(34,25,15,.5); display:none; align-items:center; justify-content:center; z-index:100; padding:20px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:#fff; border-radius:18px; width:100%; max-width:660px; max-height:90vh; overflow-y:auto;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.3);
}
.modal-head{display:flex; justify-content:space-between; align-items:center; padding:20px 24px; border-bottom:1px solid var(--line);}
.modal-head h3{font-size:18px; font-weight:800;}
.modal-body{padding:22px 24px;}
.modal-foot{padding:17px 24px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; gap:10px;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:15px;}
.form-grid .full{grid-column:1/-1;}
.field label{display:block; font-size:12.5px; font-weight:700; color:var(--ink-soft); margin-bottom:6px;}
.field input, .field select, .field textarea{
  width:100%; font-family:inherit; font-size:14px; padding:10px 12px; border-radius:10px; border:1.5px solid var(--line); background:#fbfaf7;
}
.field input:focus, .field select:focus, .field textarea:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
.field.section-label{grid-column:1/-1; margin-top:6px; padding-top:12px; border-top:1.5px dashed var(--line);}
.field.section-label span{font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--accent-dark); font-weight:800;}

.icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);padding:7px;border-radius:8px;display:flex;}
.icon-btn:hover{background:var(--line-soft); color:var(--ink);}

.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff;
  padding:12px 22px; border-radius:12px; font-size:14px; font-weight:600; opacity:0; transition:.25s; z-index:200; box-shadow:var(--shadow-lg);
  display:flex; align-items:center; gap:8px;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.empty-state{text-align:center; padding:64px 20px; color:var(--muted);}
.empty-state svg{width:42px;height:42px; margin-bottom:14px; opacity:.4;}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-thumb{background:#e0d2b8; border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}

@media(max-width:860px){
  .sidebar{position:fixed; left:-280px; z-index:50; transition:.2s; box-shadow:0 0 0 2000px rgba(0,0,0,0);}
  .sidebar.open{left:0; box-shadow:0 0 0 2000px rgba(0,0,0,.4);}
  .content{padding:16px;}
  .topbar{padding:14px 16px;}
  .form-grid{grid-template-columns:1fr;}
}
.hamburger{display:none; background:none; border:1.5px solid var(--line); border-radius:10px; padding:8px; cursor:pointer;}
@media(max-width:860px){.hamburger{display:flex;}}
</style>
</head>

  'LT':'Lieutenant', 'CNE':'Capitaine', 'CDT':'Commandant', 'LCL':'Lieutenant‑Colonel',
  'COL':'Colonel', 'MED':'Médecin', 'INF':'Infirmier', 'PROF':'Professeur',
};
// Lookup table: compact normalized key (letters only, uppercase) -> canonical grade code
const GRADE_KEY_MAP = {
  'CAP':'CAP',
  'CAPC':'CAP/C',
  'SGT':'SGT','SERGENT':'SGT',
  'SGTC':'SGT/C','SERGENTCHEF':'SGT/C',
  'ADJ':'ADJ','ADJUDANT':'ADJ',
  'ADJC':'ADJ/C','ADJUDANTCHEF':'ADJ/C','ADJCHEF':'ADJ/C','AC':'ADJ/C',
  'ADJCM':'ADJ/CM','ADJCHEFMAJOR':'ADJ/CM','ACM':'ADJ/CM','ADJCM ':'ADJ/CM',
  'LT':'LT','LIEUTENANT':'LT',
  'CNE':'CNE','CAPITAIN':'CNE','CAPITAINE':'CNE',
  'CDT':'CDT','COMMANDANT':'CDT',
  'LCL':'LCL','LTCOL':'LCL','LIEUTENANTCOLONEL':'LCL',
  'COL':'COL','COLONEL':'COL',
  'MEDECIN':'MED','DOCTEUR':'MED','DR':'MED','MED':'MED',
  'INF':'INF','INFIERMIER':'INF','INFIRMIER':'INF','INFEIRMEIRE':'INF','INFIRMIERE':'INF',
  'PROF':'PROF','PROFESSEUR':'PROF',
};
function canonicalGrade(raw){
  if(!raw) return '';
  const key = String(raw).toUpperCase().replace(/[^A-Z]/g,'');
  return GRADE_KEY_MAP[key] || raw.trim();
}
// Normalize grade fields in-place on load so every filter/synthèse/badge uses the canonical code
(function normalizeAllGrades(){
  BASE_PEOPLE.forEach(p=>{ if(p.grade){ const orig=p.grade; const canon=canonicalGrade(orig); if(canon!==orig){ p.grade_brut=orig; p.grade=canon; } } });
  BASE_FORMATIONS.forEach(f=>{ if(f.grade){ const orig=f.grade; const canon=canonicalGrade(orig); if(canon!==orig){ f.grade_brut=orig; f.grade=canon; } } });
})();

/* ============================================================
   STORAGE LAYER
   ============================================================ */
const STORAGE_KEY = 'sd_nat_overrides_v1';
let overrides = { edits:{}, added:[], deleted:[] };
let storageAvailable = true;
try{
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw) overrides = JSON.parse(raw);
}catch(e){ storageAvailable = false; }

function persist(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
  }catch(e){ storageAvailable = false; }
}

let nextId = Math.max(0, ...BASE_PEOPLE.map(p=>p.id), ...overrides.added.map(p=>p.id)) + 1;

function getPeople(){
  const deleted = new Set(overrides.deleted);
  const list = BASE_PEOPLE
    .filter(p=>!deleted.has(p.id))
    .map(p=> overrides.edits[p.id] ? {...p, ...overrides.edits[p.id]} : p);
  const added = overrides.added.filter(p=>!deleted.has(p.id));
  return list.concat(added);
}

function savePerson(data){
  if(data.id && (BASE_PEOPLE.some(p=>p.id===data.id) )){
    overrides.edits[data.id] = data;
  } else if(data.id && overrides.added.some(p=>p.id===data.id)){
    overrides.added = overrides.added.map(p=>p.id===data.id?data:p);
  } else {
    data.id = nextId++;
    overrides.added.push(data);
  }
  persist();
}

function deletePerson(id){
  overrides.deleted.push(id);
  persist();
}

function resetAllData(){
  overrides = { edits:{}, added:[], deleted:[] };
  persist();
}

   UTIL
   ============================================================ */
function esc(s){ return (s===undefined||s===null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
const CATS = ['Lourde','Moyenne','Legere','HUSAR','Nautique','FDF','IMP','Autre'];
const CAT_LABELS = {Lourde:'Lourde', Moyenne:'Moyenne', Legere:'Légère', HUSAR:'HUSAR', Nautique:'Nautique', FDF:'FDF', IMP:'IMP', Autre:'Autre'};
function catClass(cat){ return (cat||'autre').toLowerCase(); }
function catLabel(cat){ return CAT_LABELS[cat] || cat || '—'; }
function gradeLabel(g){ return GRADE_LABELS[g] || g || '—'; }
function uniqueSorted(arr){ return [...new Set(arr)].filter(Boolean).sort((a,b)=>a.localeCompare(b)); }
function normName(s){
  if(!s) return '';
  return s.toUpperCase()
    .replace(/[ÀÂÄ]/g,'A').replace(/[ÉÈÊË]/g,'E').replace(/[ÎÏ]/g,'I').replace(/[ÔÖ]/g,'O').replace(/[ÛÜÙ]/g,'U')
    .replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function formationsFor(person){
  const n = normName(person.nom);
  return BASE_FORMATIONS.filter(f=>f.nom_norm===n);
}
function peopleTrainedSet(){
  return new Set(BASE_FORMATIONS.map(f=>f.nom_norm));
}
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'), 2600);
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr); if(isNaN(d)) return null;
  return Math.floor((d - new Date())/86400000);
}
function passportStatus(p){
  if(!p.passeport_num && !p.passeport_validite) return {label:'À renseigner', cls:'status-missing'};
  if(!p.passeport_validite) return {label:'Validité manquante', cls:'status-missing'};
  const d = daysUntil(p.passeport_validite);
  if(d===null) return {label:'À renseigner', cls:'status-missing'};
  if(d<0) return {label:'Expiré', cls:'status-expired'};
  if(d<=90) return {label:'Expire bientôt', cls:'status-warn'};
  return {label:'Valide', cls:'status-ok'};
}

function applyPersonnelFilters(list){
  let out = list;
  if(personnelFilters.equipeExact) out = out.filter(p=>p.equipe===personnelFilters.equipeExact);
  if(personnelFilters.q){
    const q = personnelFilters.q.toLowerCase();
    out = out.filter(p=> (p.nom+' '+p.fonction+' '+p.grade).toLowerCase().includes(q));
  }
  if(personnelFilters.region) out = out.filter(p=>p.region===personnelFilters.region);
  if(personnelFilters.categorie) out = out.filter(p=>p.categorie===personnelFilters.categorie);
  if(personnelFilters.grade) out = out.filter(p=>p.grade===personnelFilters.grade);
  if(personnelFilters.doublons){ const dset = duplicateNameSet(); out = out.filter(p=>dset.has(normName(p.nom))); }
  return out;
}

function renderPersonnelBody(){
  const all = getPeople();
  let list = applyPersonnelFilters(all);
  const dset = duplicateNameSet();
  list = list.slice().sort((a,b)=>{
    if(personnelFilters.doublons){
      const an=normName(a.nom), bn=normName(b.nom);
      if(an!==bn) return an.localeCompare(bn);
    }
    const k=sortState.key;
    const av=(a[k]||'').toString(), bv=(b[k]||'').toString();
    return av.localeCompare(bv)*sortState.dir;
  });
  document.getElementById('resultCount').textContent = `${list.length} / ${all.length} agents`;
  const cls = catClass;
  document.getElementById('personnelBody').innerHTML = list.map(p=>{
    const st = passportStatus(p);
    const isDup = dset.has(normName(p.nom));
    return `<tr data-id="${p.id}" ${isDup?'style="background:var(--moyenne-soft);"':''}>
      <td class="name-cell">${esc(p.nom)}${isDup?' <span class="badge status-warn" title="Nom identique à une autre fiche">doublon ?</span>':''}${p.formation?`<div class="sub-cell">${esc(p.formation)}</div>`:''}</td>
      <td><span class="mono">${esc(p.grade||'—')}</span></td>
      <td>${esc(p.fonction||'—')}</td>
      <td>${esc(p.region)}<div class="sub-cell">${esc(p.equipe)}</div></td>
      <td><span class="badge ${cls(p.categorie)}">${catLabel(p.categorie)}</span></td>
      <td class="mono">${esc(p.telephone||'—')}</td>
      <td><span class="badge ${st.cls}">${st.label}</span></td>
      <td>${(()=>{ const fc=formationsFor(p).length; return fc? `<span class="badge legere">${fc} formation${fc>1?'s':''}</span>` : `<span class="badge status-missing">—</span>`; })()}</td>
      <td class="actions-cell"><button class="btn sm" data-edit="${p.id}">Modifier</button></td>
    </tr>`;
  }).join('') || `<tr><td colspan="9">${emptyState('Aucun résultat pour ces filtres.')}</td></tr>`;

  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openPersonModal(parseInt(b.dataset.edit))));
}

function renderVehicules(){

    <select id="ffunite"><option value="">Toutes unités d'origine</option>${unites.map(u=>`<option value="${esc(u)}" ${formationFilters.unite===u?'selected':''}>${esc(u)}</option>`).join('')}</select>
    <select id="ffgrade"><option value="">Tous grades</option>${grades.map(g=>`<option value="${esc(g)}" ${formationFilters.grade===g?'selected':''}>${esc(g)}</option>`).join('')}</select>

let passportFilters = { q:'', categorie:'', statut:'' };

function renderPasseports(){
  const people = getPeople();
  const total = people.length;

  function statLine(sub){
    const eff = sub.length;
    const dos = sub.filter(p=>p.dos).length;
    const dispo = sub.filter(p=>p.a_disposition && !p.dos).length;
    const valide = sub.filter(p=>p.dos || p.a_disposition).length;
    return {eff, dos, dispo, valide, nonvalide: eff-valide};
  }

  const groupsMain = [
    {label:'Équipe HUSAR', sub: people.filter(p=>p.categorie==='HUSAR')},
    {label:'Équipe SD (Lourde + Moyenne + Légère)', sub: people.filter(p=>['Lourde','Moyenne','Legere'].includes(p.categorie))},
    {label:'Équipe Nautique', sub: people.filter(p=>p.categorie==='Nautique')},
    {label:'Équipe IMP', sub: people.filter(p=>p.categorie==='IMP')},
    {label:'Équipe FDF', sub: people.filter(p=>p.categorie==='FDF')},
    {label:'Autre', sub: people.filter(p=>p.categorie==='Autre')},
  ];
  const totalStat = statLine(people);

  let html = `<div class="grid-kpi">
    <div class="kpi"><div class="label">Effectif recensé</div><div class="value">${totalStat.eff}</div></div>
    <div class="kpi accent-legere"><div class="label">Passeport valide (total)</div><div class="value">${totalStat.valide}</div><div class="foot">Disposition DOS + à leur disposition</div></div>
    <div class="kpi"><div class="label">Disposition DOS</div><div class="value">${totalStat.dos}</div></div>
    <div class="kpi"><div class="label">À leur disposition</div><div class="value">${totalStat.dispo}</div></div>
    <div class="kpi accent-lourde"><div class="label">Non validé</div><div class="value">${totalStat.nonvalide}</div><div class="foot">${Math.round(totalStat.nonvalide/(totalStat.eff||1)*100)}% de l'effectif</div></div>
  </div>`;

  html += `<div class="panel"><div class="panel-head"><h3>Synthèse des passeports par équipe</h3><span class="hint">logique officielle DOS / à disposition</span></div>
    <div class="table-scroll"><table class="data">
    <thead><tr><th>Équipe</th><th>Effectif total</th><th>Disposition DOS</th><th>À leur disposition</th><th>Total valide</th><th>Non validé</th><th>% valide</th></tr></thead>
    <tbody>${groupsMain.map(g=>{ const s=statLine(g.sub); const pct= s.eff? Math.round(s.valide/s.eff*100):0; return `<tr>
      <td class="name-cell">${esc(g.label)}</td><td class="mono">${s.eff}</td><td class="mono">${s.dos||'—'}</td>
      <td class="mono">${s.dispo||'—'}</td><td class="mono"><b>${s.valide||'—'}</b></td>
      <td class="mono" style="color:var(--lourde)">${s.nonvalide}</td>
      <td><div class="track" style="width:80px; display:inline-block; vertical-align:middle;"><div class="fill" style="width:${pct}%; background:var(--legere)"></div></div> <span class="mono" style="font-size:11px;">${pct}%</span></td>
    </tr>`; }).join('')}
    <tr style="background:var(--line-soft); font-weight:700;"><td class="name-cell">TOTAL</td><td class="mono">${totalStat.eff}</td><td class="mono">${totalStat.dos}</td><td class="mono">${totalStat.dispo}</td><td class="mono">${totalStat.valide}</td><td class="mono" style="color:var(--lourde)">${totalStat.nonvalide}</td><td></td></tr>
    </tbody></table></div></div>`;

  // detailed sub-breakdown (SD legere/moyenne/lourde separated)
  const subGroups = [
    {label:'HUSAR', sub: people.filter(p=>p.categorie==='HUSAR')},
    {label:'SD — Légère', sub: people.filter(p=>p.categorie==='Legere')},
    {label:'SD — Moyenne', sub: people.filter(p=>p.categorie==='Moyenne')},
    {label:'SD — Lourde', sub: people.filter(p=>p.categorie==='Lourde')},
    {label:'Nautique', sub: people.filter(p=>p.categorie==='Nautique')},
    {label:'IMP', sub: people.filter(p=>p.categorie==='IMP')},
    {label:'FDF', sub: people.filter(p=>p.categorie==='FDF')},
  ];
  html += `<div class="panel"><div class="panel-head"><h3>Détail par sous-catégorie</h3></div>
    <div class="table-scroll"><table class="data">
    <thead><tr><th>Sous-catégorie</th><th>Effectif</th><th>Disposition DOS</th><th>À leur disposition</th><th>Total valide</th><th>Non validé</th></tr></thead>
    <tbody>${subGroups.map(g=>{ const s=statLine(g.sub); return `<tr>
      <td class="name-cell"><span class="badge ${catClass(g.label.includes('Légère')?'Legere':g.label.includes('Moyenne')?'Moyenne':g.label.includes('Lourde')?'Lourde':g.label)}">${esc(g.label)}</span></td>
      <td class="mono">${s.eff}</td><td class="mono">${s.dos||'—'}</td><td class="mono">${s.dispo||'—'}</td>
      <td class="mono"><b>${s.valide||'—'}</b></td><td class="mono" style="color:var(--lourde)">${s.nonvalide}</td>
    </tr>`; }).join('')}</tbody></table></div></div>`;

  // detailed individual list
  const cats = CATS;
  html += `<div class="filters">
    <input type="text" id="pfq" placeholder="Rechercher un nom, CIN, N° passeport…" value="${esc(passportFilters.q)}">
    <select id="pfcat"><option value="">Toutes catégories</option>${cats.map(c=>`<option value="${c}" ${passportFilters.categorie===c?'selected':''}>${catLabel(c)}</option>`).join('')}</select>
    <select id="pfstatut"><option value="">Tous statuts</option>
      <option value="dos" ${passportFilters.statut==='dos'?'selected':''}>Disposition DOS</option>

    <div class="resultcount" id="pfResultCount"></div>
  </div>
  <div class="table-scroll"><table class="data">
    <thead><tr><th>Nom</th><th>Grade</th><th>Catégorie</th><th>CIN</th><th>PPR</th><th>N° Passeport</th><th>Délivrance</th><th>Validité</th><th>Statut</th></tr></thead>
    <tbody id="passeportsBody"></tbody>
  </table></div>`;

  document.getElementById('content').innerHTML = html;
  document.getElementById('pfq').addEventListener('input', e=>{ passportFilters.q=e.target.value; renderPasseportsBody(); });
  document.getElementById('pfcat').addEventListener('change', e=>{ passportFilters.categorie=e.target.value; renderPasseportsBody(); });
  document.getElementById('pfstatut').addEventListener('change', e=>{ passportFilters.statut=e.target.value; renderPasseportsBody(); });
  renderPasseportsBody();
}

function renderPasseportsBody(){
  const people = getPeople();
  let list = people;
  if(passportFilters.q){
    const q = passportFilters.q.toLowerCase();
    list = list.filter(p=>(p.nom+' '+(p.cin||'')+' '+(p.passeport_num||'')).toLowerCase().includes(q));
  }
  if(passportFilters.categorie) list = list.filter(p=>p.categorie===passportFilters.categorie);
  if(passportFilters.statut==='dos') list = list.filter(p=>p.dos);
  else if(passportFilters.statut==='dispo') list = list.filter(p=>p.a_disposition && !p.dos);
  else if(passportFilters.statut==='none') list = list.filter(p=>!p.dos && !p.a_disposition);

  document.getElementById('pfResultCount').textContent = `${list.length} / ${people.length} agents`;
  document.getElementById('passeportsBody').innerHTML = list.map(p=>{
    let statutLabel, statutCls;
    if(p.dos){ statutLabel='Disposition DOS'; statutCls='status-ok'; }
    else if(p.a_disposition){ statutLabel='À leur disposition'; statutCls='status-ok'; }
    else { statutLabel='Non validé'; statutCls='status-missing'; }
    return `<tr>
      <td class="name-cell">${esc(p.nom)}</td>
      <td class="mono">${esc(p.grade||'—')}</td>
      <td><span class="badge ${catClass(p.categorie)}">${catLabel(p.categorie)}</span></td>
      <td class="mono">${esc(p.cin||'—')}</td>
      <td class="mono">${esc(p.ppr||'—')}</td>
      <td class="mono">${esc(p.passeport_num||'—')}</td>
      <td class="mono">${esc(p.passeport_delivrance||'—')}</td>
      <td class="mono">${esc(p.passeport_validite||'—')}</td>
      <td><span class="badge ${statutCls}">${statutLabel}</span></td>
    </tr>`;
  }).join('') || `<tr><td colspan="9">${emptyState('Aucun résultat pour ces filtres.')}</td></tr>`;
}

function renderRegionSynthese(){
  const people = getPeople();

    const sub = people.filter(p=>p.region===r);
    const veh = new Set(sub.map(p=>p.vehicule+'|'+p.immatriculation)).size;

    return { region:r, total:sub.length, byCat, vehicules: veh, equipes: new Set(sub.map(p=>p.equipe)).size };

  let html = `<div class="table-scroll"><table class="data">

      <td class="name-cell">${esc(r.region)}</td>

  document.getElementById('content').innerHTML = html;
}

/* ============================================================
   RENDER — ALERTES
   ============================================================ */
function renderAlertes(){
  const people = getPeople();
  const withStatus = people.map(p=>({p, st:passportStatus(p)}));
  const missing = withStatus.filter(x=>x.st.cls==='status-missing');
  const expiring = withStatus.filter(x=>x.st.cls==='status-warn');
  const expired = withStatus.filter(x=>x.st.cls==='status-expired');

  let html = `<div class="grid-kpi">
    <div class="kpi"><div class="label">Passeports expirés</div><div class="value" style="color:var(--danger)">${expired.length}</div></div>
    <div class="kpi"><div class="label">Expirent sous 90 jours</div><div class="value" style="color:var(--warn)">${expiring.length}</div></div>
    <div class="kpi"><div class="label">Information manquante</div><div class="value" style="color:var(--muted)">${missing.length}</div></div>
  </div>`;

  function section(title, arr){
    if(!arr.length) return '';
    return `<div class="panel"><div class="panel-head"><h3>${esc(title)}</h3><span class="hint">${arr.length} agent(s)</span></div>
      <div class="table-scroll"><table class="data">
      <thead><tr><th>Nom</th><th>Grade</th><th>Région</th><th>N° Passeport</th><th>Validité</th><th></th></tr></thead>
      <tbody>${arr.map(x=>`<tr>
        <td class="name-cell">${esc(x.p.nom)}</td><td class="mono">${esc(x.p.grade||'—')}</td>
        <td>${esc(x.p.region)}</td><td class="mono">${esc(x.p.passeport_num||'—')}</td>
        <td class="mono">${esc(x.p.passeport_validite||'—')}</td>
        <td><button class="btn sm" data-edit="${x.p.id}">Compléter</button></td>
      </tr>`).join('')}</tbody></table></div></div>`;
  }
  html += section('Passeports expirés', expired);
  html += section('Passeports expirant sous 90 jours', expiring);
  html += section('Informations manquantes', missing);
  if(!expired.length && !expiring.length && !missing.length) html += emptyState('Tous les dossiers sont à jour.');

  document.getElementById('content').innerHTML = html;
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openPersonModal(parseInt(b.dataset.edit))));
}

    <div class="field"><label>Grade</label><input id="f_grade" value="${esc(p.grade)}" placeholder="ADJ, CAP/C, LT…"></div>
    <div class="field"><label>Fonction</label><input id="f_fonction" value="${esc(p.fonction)}"></div>
    <div class="field"><label>Téléphone</label><input id="f_telephone" value="${esc(p.telephone)}"></div>
    <div class="field"><label>Catégorie d'équipe</label>
      <select id="f_categorie">
        ${CATS.map(c=>`<option value="${c}" ${p.categorie===c?'selected':''}>${catLabel(c)}</option>`).join('')}
      </select>
    </div>
    <div class="field"><label>Équipe</label><input id="f_equipe" value="${esc(p.equipe)}" placeholder="Equipe Moyenne UMRI ..."></div>
    <div class="field"><label>Région / Unité</label><input id="f_region" value="${esc(p.region)}"></div>
    <div class="field"><label>Véhicule affecté</label><input id="f_vehicule" value="${esc(p.vehicule)}"></div>
    <div class="field"><label>Immatriculation</label><input id="f_immatriculation" value="${esc(p.immatriculation)}"></div>

    <div class="field section-label"><span>Documents & identité</span></div>
    <div class="field"><label>PPR</label><input id="f_ppr" value="${esc(p.ppr)}"></div>
    <div class="field"><label>CIN</label><input id="f_cin" value="${esc(p.cin)}"></div>
    <div class="field"><label>Date de naissance</label><input type="date" id="f_date_naissance" value="${esc(p.date_naissance)}"></div>
    <div class="field"><label>N° Passeport</label><input id="f_passeport_num" value="${esc(p.passeport_num)}"></div>
    <div class="field"><label>Date de délivrance</label><input type="date" id="f_passeport_delivrance" value="${esc(p.passeport_delivrance)}"></div>
    <div class="field"><label>Validité du passeport</label><input type="date" id="f_passeport_validite" value="${esc(p.passeport_validite)}"></div>
    <div class="field full"><label>Notes</label><textarea id="f_notes" rows="2">${esc(p.notes)}</textarea></div>
    ${p && (p.categories_secondaires && p.categories_secondaires.length ? `<div class="field full" style="font-size:12px; color:var(--muted);">Autres équipes : ${p.categories_secondaires.map(c=>`<span class="badge ${catClass(c)}" style="margin-right:4px;">${catLabel(c)}</span>`).join('')}</div>` : '')}
    ${p && p.id ? `<div class="field full" style="font-size:12px; color:var(--muted);">Statut dossier passeport : ${p.dos?'<span class="badge status-ok">Disposition DOS</span>':p.a_disposition?'<span class="badge status-ok">À leur disposition</span>':'<span class="badge status-missing">Non validé</span>'}</div>` : ''}
    ${p && p.id ? formationsSection(p) : ''}
  </div>`;
}

function formationsSection(p){
  const fs = formationsFor(p);
  if(!fs.length) return `<div class="field section-label" style="margin-top:16px;"><span>Formations suivies</span></div><div class="field full" style="font-size:12.5px; color:var(--muted);">Aucune formation recensée pour cet agent dans les messages officiels chargés.</div>`;
  return `<div class="field section-label" style="margin-top:16px;"><span>Formations suivies (${fs.length})</span></div>
  <div class="field full">
    <div class="table-scroll"><table class="data" style="font-size:12px;">
      <thead><tr><th>Formation</th><th>Session</th><th>Dates</th><th>Lieu</th></tr></thead>
      <tbody>${fs.map(f=>`<tr><td>${esc(f.formation)}</td><td>${esc(f.session)}${f.groupe&&f.groupe!=='-'?' · '+esc(f.groupe):''}</td><td class="mono">${esc(f.date)}</td><td>${esc(f.lieu)}</td></tr>`).join('')}</tbody>
    </table></div>
  </div>`;
}

function openPersonModal(id){
  const all = getPeople();
  const p = id ? all.find(x=>x.id===id) : null;
  document.getElementById('modalTitle').textContent = p ? 'Modifier — '+p.nom : 'Ajouter un agent';
  document.getElementById('modalBody').innerHTML = personFieldsForm(p);
  document.getElementById('modalDelete').style.display = p ? 'inline-flex' : 'none';
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  overlay.dataset.editId = p ? p.id : '';
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

function collectForm(){
  const g = id=>document.getElementById(id).value.trim();
  return {
    nom:g('f_nom'), grade:g('f_grade'), fonction:g('f_fonction'), telephone:g('f_telephone'),
    categorie:g('f_categorie'), equipe:g('f_equipe'), region:g('f_region'), unite:g('f_region'),
    vehicule:g('f_vehicule'), immatriculation:g('f_immatriculation'), cin:g('f_cin'), ppr:g('f_ppr'),
    date_naissance:g('f_date_naissance'), passeport_num:g('f_passeport_num'), passeport_delivrance:g('f_passeport_delivrance'), passeport_validite:g('f_passeport_validite'),
    notes:g('f_notes'), formation:''
  };
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target.id==='modalOverlay') closeModal(); });
document.getElementById('modalSave').addEventListener('click', ()=>{
  const data = collectForm();
  if(!data.nom){ showToast('Le nom est obligatoire.'); return; }
  const overlay = document.getElementById('modalOverlay');
  const editId = overlay.dataset.editId;
  if(editId) data.id = parseInt(editId);
  savePerson(data);
  closeModal();
  showToast('Fiche enregistrée.');
  render();
});
document.getElementById('modalDelete').addEventListener('click', ()=>{
  const overlay = document.getElementById('modalOverlay');
  const editId = overlay.dataset.editId;
  if(editId && confirm('Supprimer définitivement cette fiche ?')){
    deletePerson(parseInt(editId));
    closeModal();
    showToast('Fiche supprimée.');
    render();
  }
});
document.getElementById('btnAddPerson').addEventListener('click', ()=>openPersonModal(null));

/* ============================================================
   EXPORT / IMPORT
   ============================================================ */
document.getElementById('btnExport').addEventListener('click', ()=>{
  const data = getPeople();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'sd_nat_personnel_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  showToast('Export généré.');
});
document.getElementById('btnImport').addEventListener('click', ()=>document.getElementById('fileImport').click());
document.getElementById('fileImport').addEventListener('change', e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = evt=>{
    try{
      const arr = JSON.parse(evt.target.result);
      if(!Array.isArray(arr)) throw new Error('format');
      overrides = { edits:{}, added:[], deleted: BASE_PEOPLE.map(p=>p.id) };
      arr.forEach(p=>{ if(!p.id) p.id = nextId++; overrides.added.push(p); });
      persist();
      showToast('Import réussi — '+arr.length+' fiches chargées.');
      render();
    }catch(err){ showToast('Fichier JSON invalide.'); }
  };
  reader.readAsText(file);
  e.target.value='';
});

/* ============================================================
   ROUTER
   ============================================================ */
const TITLES = {
  dashboard:['Tableau de bord','Vue d’ensemble des équipes nationales'],
  equipes:['Équipes','Composition et articulation par équipe'],
  personnel:['Personnel','Fiches individuelles — recherche, filtres, édition'],
  passeports:['État des passeports','Synthèse officielle DOS / à disposition — toutes équipes'],
  vehicules:['Véhicules & matériel','Moyens matériels par équipe et région'],
  formations:['Formations','Sessions de formation SD, matériel de recherche et SCAN — 5 messages officiels'],
  region:['Synthèse par région','Effectifs et moyens agrégés par région / unité'],
  grade:['Synthèse par grade','Répartition des effectifs par grade et catégorie'],
  alertes:['Alertes documents','Passeports et informations manquantes ou à renouveler'],
};

function render(){
  renderNav();
  const [title,sub] = TITLES[currentView];
  document.getElementById('pageTitle').textContent = title;
  document.getElementById('pageSub').textContent = sub;
  document.getElementById('footCount').textContent = getPeople().length;
  if(currentView==='dashboard') renderDashboard();
  else if(currentView==='equipes') renderEquipes();
  else if(currentView==='personnel') renderPersonnel();
  else if(currentView==='passeports') renderPasseports();
  else if(currentView==='vehicules') renderVehicules();
  else if(currentView==='formations') renderFormations();
  else if(currentView==='region') renderRegionSynthese();
  else if(currentView==='grade') renderGradeSynthese();
  else if(currentView==='alertes') renderAlertes();
  document.getElementById('sidebar').classList.remove('open');
}

document.getElementById('hamburger').addEventListener('click', ()=>document.getElementById('sidebar').classList.toggle('open'));

if(!storageAvailable){
  setTimeout(()=>showToast('Stockage local indisponible — pensez à exporter vos modifications.'), 800);
}

render();
</script>
